<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<meta name="description"
	content="Hương nhang thảo mộc Buddha King – nhang sạch tinh khiết từ nguyên liệu tự nhiên, an toàn cho sức khỏe và môi trường.">
<meta name="robots" content="index,follow,max-image-preview:large">
<meta name="author" content="Buddha King">
<meta name="theme-color" content="#B8962E">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title th:text="${title} ?: 'Buddha King - Hương thảo mộc thiên nhiên'"></title>
<link th:if="${content=='home'}" rel="preload" as="image" th:href="@{/image/Mobile_banner(2).webp}" media="(max-width: 768px)">
<link th:if="${content=='home'}" rel="preload" as="image" th:href="@{/image/HeroBanner.webp}" media="(min-width: 768px)">
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
	crossorigin="anonymous">
<link rel="stylesheet" th:href="@{/css/common.css}">
<link rel="stylesheet" th:href="@{/css/home.css}"
	th:if="${content=='home'}">
<link rel="stylesheet" th:href="@{/css/contact.css}"
	th:if="${content=='contact'}">
<link rel="stylesheet" th:href="@{/css/cart.css}"
	th:if="${content=='cart'}">
<link rel="stylesheet" th:href="@{/css/CNSH.css}"
	th:if="${content=='CNSH' || content=='about'}">
<link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">
<!-- Thư viện animate.css -->
<link rel="stylesheet" th:if="${content=='CNSH' || content=='about'}"
	th:href="@{https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css}" />
<!-- Thư viện Animate On Scroll -->
<link rel="stylesheet" th:if="${content=='home' || content=='about' || content=='CNSH'}"
	th:href="@{https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css}" />
<!-- Thư viện bootstrap icon -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
	rel="stylesheet">
</head>

<body th:attr="ng-app=${content == 'cart' || content == 'contact' ? 'myApp' : null},
               ng-controller=${content == 'cart' || content == 'contact' ? 'myCtrl' : null}">

	<header th:replace="~{fragments/header}"></header>

	<main th:replace="${content}"></main>

	<footer th:replace="~{fragments/footer}"></footer>

	<script th:if="${content == 'cart' || content == 'contact'}" th:src="@{/vendor/Angular.min.js}"></script>
	<script defer th:if="${content=='cart' || content=='contact'}"
        src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
	<script 
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
		crossorigin="anonymous"></script>
	<!-- script của AOS -->
	<script th:if="${content=='home' || content=='about' || content=='CNSH'}"
        src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
	<script th:if="${content == 'cart' || content == 'contact'}" th:src="@{/javascript/index.js}"></script>
	
	<script th:if="${content == 'home' || content == 'about' || content == 'CNSH'}" type="text/javascript">
		document.addEventListener("DOMContentLoaded", function () {
		    AOS.init({
		        duration: 1000,
		        once: true
		    });
		});
		
		document.addEventListener("DOMContentLoaded", function () {

		    if (window.location.pathname === "/") {
		        const track = document.querySelector('[style*="animation: reviewScroll"]');

		        if (track) {
		            const content = track.innerHTML;
		            track.innerHTML += content;
		        }
		    }

		});
	</script>
</body>

</html>
